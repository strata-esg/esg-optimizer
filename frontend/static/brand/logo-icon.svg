<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Arc de fond -->
  <path
    d="M 6,24 A 14,14 0 1,1 34,24"
    stroke="#D4F0D8"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Arc actif (~72%) -->
  <path
    d="M 6,24 A 14,14 0 0,1 28,9"
    stroke="#1A3D22"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Point central -->
  <circle cx="20" cy="22" r="2.5" fill="#1A3D22"/>
  <!-- Aiguille -->
  <line x1="20" y1="22" x2="30" y2="10" stroke="#1A3D22" stroke-width="2" stroke-linecap="round"/>
  <!-- Tip -->
  <circle cx="30" cy="10" r="2" fill="#7FC686"/>
</svg>
