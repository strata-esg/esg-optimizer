<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <rect width="40" height="40" rx="8" fill="#1A3D22"/>
  <!-- Arc de fond -->
  <path d="M 6,24 A 14,14 0 1,1 34,24"
        stroke="rgba(212,240,216,0.35)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Arc actif -->
  <path d="M 6,24 A 14,14 0 0,1 28,9"
        stroke="#7FC686" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Moyeu -->
  <circle cx="20" cy="22" r="2.5" fill="#D4F0D8"/>
  <!-- Aiguille -->
  <line x1="20" y1="22" x2="30" y2="10"
        stroke="#D4F0D8" stroke-width="2" stroke-linecap="round"/>
  <!-- Pointe -->
  <circle cx="30" cy="10" r="2" fill="#7FC686"/>
</svg>